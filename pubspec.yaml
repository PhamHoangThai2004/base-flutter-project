name: base_flutter_project
description: "A base flutter project"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  bot_toast: ^4.1.3
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  injectable_generator: ^2.12.1
  flutter_launcher_icons: ^0.14.4
  flutter_gen_runner: ^5.13.0+1
  build_runner: ^2.12.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"

flutter_gen:
  output: lib/generated/
  line_length: 80
  integrations:
    flutter_svg: true
    lottie: true
    
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

